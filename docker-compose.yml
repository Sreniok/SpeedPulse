services:
  init:
    build: .
    container_name: speedpulse-init
    restart: "no"
    entrypoint: ["/bin/sh", "/app/init.sh", "/workspace"]
    security_opt:
      - apparmor=${DOCKER_APPARMOR_PROFILE:-docker-default}
    volumes:
      - .:/workspace

  postgres:
    image: postgres:16-alpine
    container_name: speedpulse-postgres
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build: .
    container_name: speedpulse-migrate
    restart: "no"
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - TZ=${TZ:-UTC}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - APP_DATA_DIR=/app/data
    command: ["python", "db_migrate.py", "--import-logs"]
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    container_name: speedpulse-dashboard
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
      - apparmor=${DOCKER_APPARMOR_PROFILE:-docker-default}
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    env_file:
      - path: .env
        required: false
    environment:
      - TZ=${TZ:-UTC}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - APP_DATA_DIR=/app/data
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env

  scheduler:
    build: .
    container_name: speedpulse-scheduler
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
      - apparmor=${DOCKER_APPARMOR_PROFILE:-docker-default}
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    env_file:
      - path: .env
        required: false
    environment:
      - TZ=${TZ:-UTC}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - APP_DATA_DIR=/app/data
      - HEALTH_CHECK_TIME=${HEALTH_CHECK_TIME:-07:00}
      - LOG_ROTATION_TIME=${LOG_ROTATION_TIME:-02:00}
      - RUN_STARTUP_SPEEDTEST=${RUN_STARTUP_SPEEDTEST:-false}
    command: ["python", "scheduler_service.py"]
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env

volumes:
  postgres_data:
