[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = ["E501", "W293"]

[tool.ruff.lint.isort]
known-first-party = [
  "db_migrate",
  "log_parser",
  "logger_setup",
  "mail_settings",
  "measurement_repository",
  "measurement_store",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false      # Gradual adoption — don't block on untyped legacy code.
check_untyped_defs = true
ignore_missing_imports = true      # Third-party stubs not installed yet.
