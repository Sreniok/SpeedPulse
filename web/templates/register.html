<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/logo.svg?v={{ logo_version }}" type="image/svg+xml" />
    <title>SpeedPulse — Create Account</title>
    <script src="/static/theme-catalog.js"></script>
    <script src="/static/theme-boot.js"></script>
    <link rel="stylesheet" href="/static/app.css?v={{ static_version }}" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <div class="login-brand">
          <span class="brand-mark-shell brand-mark-shell-large" aria-hidden="true">
            <svg
              class="brand-wordmark-svg"
              viewBox="0 0 380 120"
              role="img"
              aria-label="SpeedPulse logo"
            >
              <text class="brand-wordmark-speed" x="50%" y="68" text-anchor="middle">
                <tspan>Speed</tspan><tspan class="brand-wordmark-pulse">Pulse</tspan>
              </text>
              <path
                class="brand-wordmark-line-base"
                d="M14 92H78L86 88L94 96L102 89L110 92H252L268 77L278 99L288 86L296 92H360"
              />
              <path
                class="brand-wordmark-line-runner"
                d="M14 92H78L86 88L94 96L102 89L110 92H252L268 77L278 99L288 86L296 92H360"
              />
            </svg>
          </span>
        </div>
        <h1>Create Account</h1>
        <p>Set up the dashboard administrator account.</p>

        {% if error %}
        <div class="error-banner">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register" class="login-form">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            minlength="10"
            placeholder="Minimum 10 characters"
            required
          />

          <label for="confirm_password">Confirm password</label>
          <input
            id="confirm_password"
            name="confirm_password"
            type="password"
            autocomplete="new-password"
            minlength="10"
            required
          />

          <button type="submit">Create Account</button>
        </form>
      </section>
    </main>
  </body>
</html>
