name: CI

on:
  pull_request:
  push:
    tags-ignore:
      - "v*"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff mypy

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy --follow-imports=silent config_loader.py state_store.py backup_manager.py scheduler_service.py contract_reminder.py SendAlert.py SendWeeklyReport.py SendMonthlyReport.py health_check.py measurement_store.py measurement_repository.py db_migrate.py

      - name: Pytest
        run: pytest -q
