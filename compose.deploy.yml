# SpeedPulse — production deployment (pre-built image)
#
# Quick start:
#   mkdir speedpulse && cd speedpulse
#   curl -fsSL https://raw.githubusercontent.com/Sreniok/speedpulse/main/compose.deploy.yml -o docker-compose.yml
#   docker compose up -d
#
# The "init" service runs once to create .env, data/config.json, etc.
# before the dashboard and scheduler start.

services:
  init:
    image: ghcr.io/sreniok/speedpulse:latest
    container_name: speedpulse-init
    restart: "no"
    entrypoint: ["/bin/sh", "/app/init.sh", "/workspace"]
    volumes:
      - .:/workspace

  dashboard:
    image: ghcr.io/sreniok/speedpulse:latest
    container_name: speedpulse-dashboard
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    env_file:
      - path: ./.env
        required: false
    environment:
      - TZ=${TZ:-UTC}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./data/config.json:/app/config.json
      - ./.env:/app/.env
      - ./data/Log:/app/Log
      - ./data/Images:/app/Images
      - ./data/Archive:/app/Archive
      - ./data/cron.log:/app/cron.log
      - ./data/errors.log:/app/errors.log
      - ./data/last_alert.txt:/app/last_alert.txt
      - ./data/chart_base64.txt:/app/chart_base64.txt

  scheduler:
    image: ghcr.io/sreniok/speedpulse:latest
    container_name: speedpulse-scheduler
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    env_file:
      - path: ./.env
        required: false
    environment:
      - TZ=${TZ:-UTC}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - HEALTH_CHECK_TIME=${HEALTH_CHECK_TIME:-07:00}
      - LOG_ROTATION_TIME=${LOG_ROTATION_TIME:-02:00}
      - RUN_STARTUP_SPEEDTEST=${RUN_STARTUP_SPEEDTEST:-false}
    command: ["python", "scheduler_service.py"]
    volumes:
      - ./data/config.json:/app/config.json
      - ./.env:/app/.env
      - ./data/Log:/app/Log
      - ./data/Images:/app/Images
      - ./data/Archive:/app/Archive
      - ./data/cron.log:/app/cron.log
      - ./data/errors.log:/app/errors.log
      - ./data/last_alert.txt:/app/last_alert.txt
      - ./data/chart_base64.txt:/app/chart_base64.txt
